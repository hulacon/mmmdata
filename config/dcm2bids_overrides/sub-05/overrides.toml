[ses-05]
note = "3 fmap groups: encoding (enc+math), resting (rest+ret 1-2), retrieval (ret 3-4)"
fmap_groups = ["encoding", "resting", "retrieval"]

[[ses-05.tasks]]
task_label = "TBencoding"
protocol_base = "cued_recall_encoding_run{n}"
fmap_group = "encoding"
runs = 3
has_sbref = true

[[ses-05.tasks]]
task_label = "TBmath"
protocol_base = "cued_recall_math"
fmap_group = "encoding"
has_sbref = true

[[ses-05.tasks]]
task_label = "TBresting"
protocol_base = "cued_recall_resting"
fmap_group = "resting"
has_sbref = true

[[ses-05.tasks]]
task_label = "TBretrieval"
protocol_base = "cued_recall_retrieval_run{n}"
fmap_group = "resting"
runs = [1, 2]
has_sbref = true

[[ses-05.tasks]]
task_label = "TBretrieval"
protocol_base = "cued_recall_retrieval_run{n}"
fmap_group = "retrieval"
runs = [3, 4]
has_sbref = true

[ses-05.fmap_series.encoding]
ap = 5
pa = 7

[ses-05.fmap_series.resting]
ap = 25
pa = 27

[ses-05.fmap_series.retrieval]
ap = 49
pa = 51


# =============================================================================
# ses-19: Naturalistic — 3 fmap groups with encoding/math sharing desc suffix
# NATencoding split: run-1 → encoding, run-2 → math
# =============================================================================
[ses-19]
note = "3 fmap groups; encoding and math fmaps share SeriesDescription suffix"
fmap_strategy = "series_description"
fmap_groups = ["encoding", "math", "retrieval"]

[[ses-19.tasks]]
task_label = "NATencoding"
protocol_base = "free_recall_encoding_run{n}"
fmap_group = "encoding"
runs = [1]
has_sbref = true

[[ses-19.tasks]]
task_label = "NATencoding"
protocol_base = "free_recall_encoding_run{n}"
fmap_group = "math"
runs = [2]
has_sbref = true

[[ses-19.tasks]]
task_label = "NATmath"
protocol_base = "free_recall_math"
fmap_group = "math"
has_sbref = true

[[ses-19.tasks]]
task_label = "NATresting"
protocol_base = "free_recall_resting"
fmap_group = "retrieval"
has_sbref = true

[[ses-19.tasks]]
task_label = "NATretrieval"
protocol_base = "free_recall_retrieval_run{n}"
fmap_group = "retrieval"
has_sbref = true

# encoding and math fmaps both use "se_epi_*_encoding" SeriesDescription
[ses-19.fmap_desc_map]
encoding = "encoding"
math = "encoding"
retrieval = "retrieval"

[ses-19.fmap_series.encoding]
ap = 21
pa = 23

[ses-19.fmap_series.math]
ap = 33
pa = 35

[ses-19.fmap_series.retrieval]
ap = 45
pa = 47


