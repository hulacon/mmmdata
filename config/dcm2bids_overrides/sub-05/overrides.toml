# Sub-05 session overrides

# =============================================================================
# ses-02: Localizer — PRF (3 runs) + fLOC (3 runs) + tone
# =============================================================================
[ses-02]
note = "Localizer: PRF (3 runs) + fLOC (3 runs) + tone"

[[ses-02.tasks]]
task_label = "prf"
protocol_base = "localizer_prf_run{n}"
fmap_group = "first"
runs = 3
has_sbref = true

[[ses-02.tasks]]
task_label = "floc"
protocol_base = "localizer_floc_run{n}"
fmap_group = "second"
runs = 3
has_sbref = true

# floc_run1 was aborted after 5 volumes (Series 27) and restarted (Series 30).
# Pin to the correct (complete) series to skip the truncated acquisition.
[ses-02.run_series.floc]
1 = {bold = 30, sbref = 29}
2 = {bold = 34, sbref = 33}
3 = {bold = 38, sbref = 37}

# tone excluded: truncated scan (279/320 volumes); 2 good runs in ses-03

[ses-02.fmap_series.first]
ap = 5
pa = 7

[ses-02.fmap_series.second]
ap = 21
pa = 23


