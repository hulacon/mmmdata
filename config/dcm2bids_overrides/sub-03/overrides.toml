# =============================================================================
# ses-30: Final — resting, fixation, motor, auditory, FINretrieval
# FINretrieval runs 1-2 share protocol "final_cued_recall_run2" and need
# SeriesNumber disambiguation.
# =============================================================================
[ses-30]
note = "Final session: localizers + FINretrieval with duplicate protocol names"

[[ses-30.tasks]]
task_label = "FINresting"
protocol_base = "Resting"
fmap_group = "encoding"
has_sbref = true

[[ses-30.tasks]]
task_label = "fixation"
protocol_base = "fixation_calibration"
fmap_group = "encoding"
has_sbref = true

[[ses-30.tasks]]
task_label = "motor"
protocol_base = "localizer_motor_run{n}"
fmap_group = "encoding"
runs = 2
has_sbref = true

[[ses-30.tasks]]
task_label = "auditory"
protocol_base = "localizer_auditory_run1"
fmap_group = "encoding"
has_sbref = true

[[ses-30.tasks]]
task_label = "FINretrieval"
protocol_base = "final_cued_recall_run{n}"
fmap_group = "encoding"
runs = 4
has_sbref = true

# Run 1 used protocol "final_cued_recall_run2" (duplicate of run 2)
[ses-30.run_protocols.FINretrieval]
1 = "final_cued_recall_run2"

# Runs 1-2 need SeriesNumber to disambiguate (same ProtocolName)
[ses-30.run_series.FINretrieval.1]
bold = 42
sbref = 41

[ses-30.run_series.FINretrieval.2]
bold = 46
sbref = 45


# =============================================================================
# ses-28: Naturalistic — has anatomical scans + series_number fmaps
# =============================================================================
[ses-28]
note = "Anatomical session (T1w + DWI AP/PA); fmaps use series_number strategy"
fmap_strategy = "series_number"
add_anat = ["T1w_MPR", "dwi_AP", "dwi_PA"]

[ses-28.fmap_series.encoding]
ap = 5
pa = 6

[ses-28.fmap_series.retrieval]
ap = 16
pa = 17
