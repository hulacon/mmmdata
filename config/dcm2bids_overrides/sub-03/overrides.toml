# Sub-03 session overrides
# Each section documents and handles sessions deviating from the canonical schedule.

# =============================================================================
# ses-02: Localizer — PRF (3 runs) + auditory + tone
# =============================================================================
[ses-02]
note = "Localizer: PRF (3 runs) + auditory + tone"

[[ses-02.tasks]]
task_label = "prf"
protocol_base = "localizer_prf_run{n}"
fmap_group = "first"
runs = 3
has_sbref = true

[[ses-02.tasks]]
task_label = "auditory"
protocol_base = "localizer_auditory"
fmap_group = "second"
has_sbref = true

[[ses-02.tasks]]
task_label = "tone"
protocol_base = "localizer_tone"
fmap_group = "second"
has_sbref = true

[ses-02.fmap_series.first]
ap = 5
pa = 6

[ses-02.fmap_series.second]
ap = 19
pa = 21


# =============================================================================
# ses-03: Localizer — fLOC (6 runs, split) + PRF (3 runs) + tone
# =============================================================================
[ses-03]
