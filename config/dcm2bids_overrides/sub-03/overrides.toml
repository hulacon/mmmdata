runs = [4, 5, 6]
has_sbref = true

[[ses-03.tasks]]
task_label = "tone"
protocol_base = "localizer_tone"
fmap_group = "third"
has_sbref = true

[ses-03.fmap_series.first]
ap = 5
pa = 6

[ses-03.fmap_series.second]
ap = 23
pa = 25

[ses-03.fmap_series.third]
ap = 39
pa = 41


